name: Deploy Frontend (Azure Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-prod.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build and Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        # VITE_* values (API base URL + Entra SSO client/tenant/redirect) are
        # intentionally NOT injected here — they come from the committed
        # frontend/.env.production. They are public identifiers, not secrets.
        # A workflow `env:` referencing an unset secret would resolve to "" and
        # OVERRIDE .env.production at build time (this previously pinned the SWA
        # to a stale URL / mock auth).
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "frontend"
          output_location: "dist"
