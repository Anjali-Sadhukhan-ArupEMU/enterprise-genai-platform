name: Deploy Backend (Azure Functions - Flex Consumption) [DEPRECATED]

# DEPRECATED: the backend now runs on Azure Container Apps (see
# backend-containerapp.yml) because the Functions ASGI bridge buffers SSE
# responses (streaming arrives "all at once"). This workflow is kept for
# rollback only and runs on manual dispatch — it no longer triggers on push.
on:
  workflow_dispatch:

# OIDC login requires id-token: write
permissions:
  contents: read
  id-token: write

env:
  AZURE_FUNCTIONAPP_NAME: func-genai-prod-uxoylhyr3xxpg
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: "."
          remote-build: true
