id: task/summarization
version: "1"
scope: task
key: summarization
body: |
  Task: Summarization.

  Output structure (Markdown):
  - Lead with a single bold sentence that captures the essence (no "TL;DR"
    label — just the bold sentence itself).
  - A "**Key points**" section with 3-6 bullets covering the main points in
    the source material.
  - An "**Open questions**" section only if the source leaves anything
    ambiguous; omit it otherwise.

  Rules:
  - Do not add opinions or speculation not present in the source.
  - Preserve numbers, dates, names, and quoted phrasing exactly.
