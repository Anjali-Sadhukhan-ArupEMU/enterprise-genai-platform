# Maps Entra ID group display names (or object IDs) → persona.
# Lower `priority` wins when a user belongs to multiple mapped groups.
# Unknown groups fall through to the default persona.

default_persona: casual

# Entra group → persona. Match by display_name (case-insensitive) OR by group_id.
mappings:
  - persona: leadership
    priority: 10
    group_names:
      - AI-Executives
      - Arup-Leadership
    group_ids: []

  - persona: productivity
    priority: 20
    group_names:
      - AI-PowerUsers
      - AI-Developers
      - Arup-Productivity
    group_ids:
      - 72f57b3c-1ab0-47d7-9863-299aac88deb3  # AI-PowerUsers

  - persona: casual
    priority: 30
    group_names:
      - AI-BasicUsers
      - Arup-Casual-Users
    group_ids:
      - 2a0f991e-cbe7-4194-8a6e-21170dee455e  # AI-BasicUsers
